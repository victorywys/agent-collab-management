name: create-agent-collab-repo
description: Create a new repository with agent collaboration system pre-configured
triggers:
  - "create a new project"
  - "initialize repo"
  - "start a new repository"
  - "new github repo"
  - "setup agent collab repo"
  - "create collaborative project"
parameters:
  - name: project-name
    description: Name of the new repository
    required: true
  - name: project-type
    description: Type of project (generic, node, python, go, docs, config)
    required: false
    default: generic
  - name: github-user
    description: GitHub username for repository creation
    required: false